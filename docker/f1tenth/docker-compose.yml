# =============================================================================
# docker/f1tenth/docker-compose.yml
# =============================================================================

services:
  f1tenth_stack:
    build:
      context: ../../
      dockerfile: docker/f1tenth/Dockerfile
      network: host
    container_name: f1tenth_stack

    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
    runtime: nvidia

    volumes:
      - ../../src:/ros2_ws/src
      - ../../scripts:/ros2_ws/scripts

      # Mount our tuned ZED config DIRECTORY over the installed one.
      # Directory-to-directory mounts work fine with Docker overlay2.
      # Edit src/f1tenth_bringup/config/zed_config/common_stereo.yaml
      # to change tracking settings — takes effect on next docker compose up.
      - ../../src/f1tenth_bringup/config/zed_config:/opt/f1tenth_deps/install/zed_wrapper/share/zed_wrapper/config:ro

      - zed_resources:/usr/local/zed/resources

    network_mode: "host"
    privileged: true
    tty: true
    stdin_open: true

volumes:
  zed_resources:
