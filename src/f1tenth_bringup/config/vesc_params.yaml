# =============================================================================
# config/vesc_params.yaml
# =============================================================================
# F1Tenth VESC + controller config.
#
# CHANGES
#   - drive_topic added (default "ackermann_cmd", matching vesc_ackermann).
#     This is how the steering command actually reaches the servo.
#   - max_steer_angle 0.40 rad (physical hardware limit; needed to make the
#     tight 0.45 m inner-radius turn).
# =============================================================================

# -- vesc_driver -------------------------------------------------------------
vesc_driver:
  ros__parameters:
    port: /dev/ttyACM0
    duty_cycle_min: -1.0
    duty_cycle_max:  1.0
    current_min: -100.0
    current_max:  100.0
    brake_min: 0.0
    brake_max: 100000.0
    speed_min: -10000.0
    speed_max:  10000.0
    position_min: 0.0
    position_max: 100.0
    servo_min: 0.0
    servo_max: 1.0

# -- ackermann_to_vesc -------------------------------------------------------
ackermann_to_vesc:
  ros__parameters:
    speed_to_erpm_gain:   4614.0
    speed_to_erpm_offset: 0.0
    steering_angle_to_servo_gain:   -1.2135
    steering_angle_to_servo_offset:  0.5304

# -- kart_controller ---------------------------------------------------------
control_planning_node:
  ros__parameters:
    controller_mode: "pure_pursuit"
    drive_topic:     "ackermann_cmd"   # matches vesc_ackermann's subscription

    speed_nominal:    0.0        # start stopped
    wheelbase:        0.26       # metres — measure and update if different
    max_steer_angle:  0.40       # radians (F1Tenth hw max ~23°)

    kp_lateral:  2.0
    kd_lateral:  0.08
    kp_heading:  1.5

    min_quality: 0.4
